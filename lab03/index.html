<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=<device-width>, initial-scale=1.0">
<title>Materials</title>
<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<body>
<a-scene>

<a-assets>
<img id="brick" src="../assets/textures/white-brick.jpg" alt="">
<img id="lava" src="../assets/textures/lava.jpg" alt="">
</a-assets>




<a-entity position="0 0 0">
<a-sphere position="3 1.25 -5" radius="1.25" material="color: #fff; roughness: 0; metalness: 0.5; src: #brick" shadow></a-sphere>

<a-sphere position="0 1.25 -5" radius="1.25" material="color: #fff; roughness: 1; metalness: 0; src: #brick" shadow></a-sphere>

<a-sphere position="-3 1.25 -5" radius="1.25" material="color: #fff; roughness: 2; metalness: -1; src: #brick" shadow></a-sphere>

<a-plane position="0 0 -4" rotation="-90 0 0" width="12" height="12" color="#C5E0ED"></a-plane>
</a-entity>



<a-entity position="14 0 0">
<a-sphere position="3 1.25 -5" radius="1.25" material="color: #FFE100; roughness: 2; metalness: 0.25; src: #lava" shadow></a-sphere>

<a-sphere position="0 1.25 -5" radius="1.25" material="color: #FFE100; roughness: 0; metalness: 0.5; src: #lava" shadow></a-sphere>

<a-sphere position="-3 1.25 -5" radius="1.25" material="color: #FFE100; roughness: 0; metalness: 0.8; src: #lava" shadow></a-sphere>

<a-plane position="0 0 -4" rotation="-90 0 0" width="12" height="12" color="#C5E0ED"></a-plane>
</a-entity>



<a-entity position="-14 0 0">
<a-sphere position="3 1.25 -5" radius="1.25" color="#DC5F99"></a-sphere>

<a-sphere position="0 1.25 -5" radius="1.25" color="#22D4C7"></a-sphere>

<a-sphere position="-3 1.25 -5" radius="1.25" color="#E1877E"></a-sphere>

<a-plane position="0 0 -4" rotation="-90 0 0" width="12" height="12" color="#C5E0ED"></a-plane>
</a-entity>

<a-entity light="intensity: 1.0; type:ambient"></a-entity>
<a-entity light="intensity: 7; type: point" position="1.5 1.7 -2.5"

</a-scene>
</body>
</html>
