<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Dominoes</title>
       <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

</head>
<body>

    <a-scene physics="debug: true">

        <a-entity rotation="0 170 0" position="-7 0 -19">

            <a-entity>

                <a-box id="floor" position="0 0 -4" rotation="-90 0 0" width="40" height="40" depth="0.1" color="#7BC8A4" static-body="shape: box;"></a-box>
                 

      
                
                <a-box id="domino 1" position="-12.83755 0.8 -12.47428" rotation="10 0 0" width="1" height="1.5" depth="0.1" dynamic-body="shape: square; mass: 2;" shape="shape: box; halfExtents: 1 1 1;"></a-box>

                <a-box position="-12.72967 0.8 -11.86243" rotation="10 0 0" width="1" height="1.5" depth="0.1" dynamic-body="shape: square; mass: 2;" ></a-box>

               




            </a-entity>






        </a-entity>


    </a-scene>
